<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Widget</title>
<style>
  #chatbot-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #2D2FFF;
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(45,47,255,0.35);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #chatbot-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 20px rgba(45,47,255,0.45);
  }
  #chatbot-btn svg { width: 26px; height: 26px; }
  #chatbot-box {
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    display: none;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #chatbot-box.open { display: flex; }
  #chatbot-header {
    background: #2D2FFF;
    color: white;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #chatbot-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #askly-logo { width: 28px; height: 28px; flex-shrink: 0; }
  #chatbot-title { font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }
  #chatbot-header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #askly-lang-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #askly-lang-btn:hover { background: rgba(255,255,255,0.28); }
  #askly-lang-dropdown {
    display: none;
    position: fixed;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    z-index: 99999;
    min-width: 170px;
    overflow: hidden;
  }
  #askly-lang-dropdown.open { display: block; }
  .lang-option {
    padding: 10px 14px;
    font-size: 13px;
    color: #1a1a2e;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lang-option:hover { background: #f0f1ff; }
  .lang-option.active { background: #f0f1ff; color: #2D2FFF; font-weight: 600; }
  .lang-option .lang-code {
    font-weight: 700;
    font-size: 11px;
    color: #2D2FFF;
    background: #e8eaff;
    padding: 1px 6px;
    border-radius: 4px;
    min-width: 28px;
    text-align: center;
  }
  .lang-option.active .lang-code { background: #2D2FFF; color: white; }
  #chatbot-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #chatbot-close:hover { background: rgba(255,255,255,0.25); }
  #chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f7f8fc;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.bot {
    background: white;
    border: 1px solid #e8eaf0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    color: #1a1a2e;
  }
  .msg.user {
    background: #2D2FFF;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg a { color: #2D2FFF; text-decoration: underline; word-break: break-word; }
  #chatbot-footer { background: white; border-top: 1px solid #e8eaf0; flex-shrink: 0; }
  #chatbot-input-row { display: flex; gap: 8px; padding: 12px; align-items: center; }
  #chatbot-input {
    flex: 1;
    padding: 9px 13px;
    border: 1.5px solid #e8eaf0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #f7f8fc;
    transition: border 0.2s;
    color: #1a1a2e;
  }
  #chatbot-input:focus { border-color: #2D2FFF; background: white; }
  #chatbot-send, #askly-mic-btn {
    background: #2D2FFF;
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #chatbot-send:hover, #askly-mic-btn:hover { background: #1a1ccc; }
  #chatbot-send:active, #askly-mic-btn:active { transform: scale(0.95); }
  #chatbot-send:disabled { opacity: 0.45; cursor: not-allowed; }
  #askly-mic-btn.listening { background: #e53935; animation: micPulse 1s infinite; }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.45); }
    50% { box-shadow: 0 0 0 6px rgba(229,57,53,0); }
  }
  #chatbot-branding {
    text-align: center;
    padding: 4px 0 8px;
    font-size: 11px;
    color: #b0b3c6;
    letter-spacing: 0.02em;
  }
  #chatbot-branding a { color: #2D2FFF; font-weight: 600; text-decoration: none; }
  #chatbot-branding a:hover { text-decoration: underline; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #b0b3c6;
    margin: 0 2px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<button id="chatbot-btn">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
  </svg>
</button>

<div id="chatbot-box">
  <div id="chatbot-header">
    <div id="chatbot-header-left">
      <svg id="askly-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(0 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(120 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(180 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(240 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(300 50 50)"/>
        <circle cx="50" cy="50" r="10" fill="white"/>
      </svg>
      <span id="chatbot-title">Assistent</span>
    </div>
    <div id="chatbot-header-right">
      <button id="askly-lang-btn" title="Sprache wählen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button id="chatbot-close">✕</button>
    </div>
  </div>
  <div id="chatbot-messages">
    <div class="msg bot" id="welcome-msg"></div>
  </div>
  <div id="chatbot-footer">
    <div id="chatbot-input-row">
      <input id="chatbot-input" type="text" />
      <button id="askly-mic-btn" title="Spracheingabe">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button id="chatbot-send" title="Nachricht senden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="chatbot-branding">Powered by <a href="https://askly.ch" target="_blank">Askly</a></div>
  </div>
</div>

<!-- Dropdown ausserhalb chatbot-box -->
<div id="askly-lang-dropdown">
  <div class="lang-option active" data-lang="AUTO">
    <span class="lang-code">AUTO</span> Automatisch
  </div>
  <div class="lang-option" data-lang="DE">
    <span class="lang-code">DE</span> Deutsch
  </div>
  <div class="lang-option" data-lang="FR">
    <span class="lang-code">FR</span> Français
  </div>
  <div class="lang-option" data-lang="IT">
    <span class="lang-code">IT</span> Italiano
  </div>
  <div class="lang-option" data-lang="EN">
    <span class="lang-code">EN</span> English
  </div>
  <div class="lang-option" data-lang="CH">
    <span class="lang-code">CH</span> Schweizerdeutsch
  </div>
</div>

<script>
  const BACKEND = 'https://sweet-determination-production.up.railway.app';
  const WEBSITE_URL = 'https://www.meggen.ch';
  const BOT_NAME = 'Gemeinde Meggen Assistent';

  // ── UI-Übersetzungen ─────────────────────────────────────────────
  const UI_STRINGS = {
    AUTO: {
      welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.',
      placeholder: 'Ihre Frage...',
      error: 'Verbindungsfehler. Bitte erneut versuchen.',
      noAnswer: 'Keine Antwort erhalten.',
    },
    DE: {
      welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.',
      placeholder: 'Ihre Frage...',
      error: 'Verbindungsfehler. Bitte erneut versuchen.',
      noAnswer: 'Keine Antwort erhalten.',
    },
    FR: {
      welcome: 'Bonjour! Je réponds volontiers à vos questions sur la commune de Meggen.',
      placeholder: 'Votre question...',
      error: 'Erreur de connexion. Veuillez réessayer.',
      noAnswer: 'Aucune réponse reçue.',
    },
    IT: {
      welcome: 'Salve! Sono felice di rispondere alle sue domande sul comune di Meggen.',
      placeholder: 'La sua domanda...',
      error: 'Errore di connessione. Riprovare.',
      noAnswer: 'Nessuna risposta ricevuta.',
    },
    EN: {
      welcome: 'Hello! I am happy to answer your questions about the municipality of Meggen.',
      placeholder: 'Your question...',
      error: 'Connection error. Please try again.',
      noAnswer: 'No answer received.',
    },
    CH: {
      welcome: 'Hoi! I beantworte gern Iri Frage zur Gmeinde Meggen.',
      placeholder: 'Iri Frag...',
      error: 'Verbindigsfehler. Bitte nomol versuche.',
      noAnswer: 'Kei Antwort erhalte.',
    },
  };
  // ────────────────────────────────────────────────────────────────

  let context = '';
  let siteUrl = '';
  let selectedLanguage = 'AUTO';

  const MIC_LANG_CODES = {
    AUTO: 'de-CH', DE: 'de-CH', FR: 'fr-CH',
    IT: 'it-CH', EN: 'en-GB', CH: 'de-CH',
  };

  function applyLanguage(lang) {
    const strings = UI_STRINGS[lang] || UI_STRINGS['DE'];
    document.getElementById('welcome-msg').textContent = strings.welcome;
    document.getElementById('chatbot-input').placeholder = strings.placeholder;
  }

  document.getElementById('chatbot-title').textContent = BOT_NAME;
  applyLanguage('AUTO');

  async function loadContext() {
    try {
      const res = await fetch(`${BACKEND}/api/scrape?url=${encodeURIComponent(WEBSITE_URL)}`);
      const data = await res.json();
      context = data.text || '';
      siteUrl = data.siteUrl || WEBSITE_URL;
    } catch(e) {
      context = '';
      siteUrl = WEBSITE_URL;
    }
  }

  function addMsg(html, type) {
    const box = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = html;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function cleanReply(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/#{1,3} /g, '')
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<"]+)/g, (url) => {
        try {
          const { pathname } = new URL(url);
          const segments = pathname.split('/').filter(Boolean);
          const label = segments.length > 0
            ? decodeURIComponent(segments[segments.length - 1])
                .replace(/-/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase())
            : url;
          return `<a href="${url}" target="_blank" rel="noopener">${label}</a>`;
        } catch {
          return `<a href="${url}" target="_blank" rel="noopener">${url}</a>`;
        }
      });
  }

  async function send() {
    const input = document.getElementById('chatbot-input');
    const btn = document.getElementById('chatbot-send');
    const text = input.value.trim();
    if (!text) return;
    const strings = UI_STRINGS[selectedLanguage] || UI_STRINGS['DE'];
    input.value = '';
    btn.disabled = true;
    addMsg(text, 'user');
    const loading = addMsg('<span class="dot"></span><span class="dot"></span><span class="dot"></span>', 'bot');
    try {
      const res = await fetch(`${BACKEND}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, context, siteUrl, language: selectedLanguage })
      });
      const data = await res.json();
      loading.innerHTML = cleanReply(data.reply || strings.noAnswer);
    } catch(e) {
      loading.innerHTML = strings.error;
    }
    btn.disabled = false;
  }

  // ── Sprachumschalter ─────────────────────────────────────────────
  const langBtn = document.getElementById('askly-lang-btn');
  const langDropdown = document.getElementById('askly-lang-dropdown');

  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const rect = langBtn.getBoundingClientRect();
    langDropdown.style.top = (rect.bottom + 8) + 'px';
    langDropdown.style.right = (window.innerWidth - rect.right) + 'px';
    langDropdown.classList.toggle('open');
  });

  document.querySelectorAll('.lang-option').forEach(option => {
    option.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedLanguage = option.dataset.lang;
      document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
      option.classList.add('active');
      langDropdown.classList.remove('open');
      // UI sofort auf neue Sprache umstellen
      applyLanguage(selectedLanguage);
    });
  });

  document.addEventListener('click', () => langDropdown.classList.remove('open'));
  // ────────────────────────────────────────────────────────────────

  document.getElementById('chatbot-btn').onclick = () => {
    document.getElementById('chatbot-box').classList.toggle('open');
    if (!context) loadContext();
  };
  document.getElementById('chatbot-close').onclick = () => {
    document.getElementById('chatbot-box').classList.remove('open');
    langDropdown.classList.remove('open');
  };
  document.getElementById('chatbot-send').onclick = send;
  document.getElementById('chatbot-input').onkeydown = e => {
    if (e.key === 'Enter') send();
  };

  // ── Spracheingabe ────────────────────────────────────────────────
  let asklyRecognition = null;
  let asklyListening = false;
  const micBtn = document.getElementById('askly-mic-btn');

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Spracheingabe wird nur in Chrome/Edge unterstützt.');
      return;
    }
    if (asklyListening) { asklyRecognition.stop(); return; }
    const micLang = MIC_LANG_CODES[selectedLanguage] || 'de-CH';
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    asklyRecognition = new SpeechRecognition();
    asklyRecognition.lang = micLang;
    asklyRecognition.interimResults = false;
    asklyRecognition.maxAlternatives = 1;
    asklyRecognition.onstart = () => {
      asklyListening = true;
      micBtn.classList.add('listening');
    };
    asklyRecognition.onresult = (event) => {
      document.getElementById('chatbot-input').value = event.results[0][0].transcript;
      send();
    };
    asklyRecognition.onerror = () => {
      asklyListening = false;
      micBtn.classList.remove('listening');
    };
    asklyRecognition.onend = () => {
      asklyListening = false;
      micBtn.classList.remove('listening');
    };
    asklyRecognition.start();
  }

  micBtn.onclick = toggleMic;
  // ────────────────────────────────────────────────────────────────
</script>
</body>
</html>
