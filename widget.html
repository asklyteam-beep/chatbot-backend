<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Widget</title>
<style>
  #chatbot-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1B17FF;
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(27,23,255,0.35);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #chatbot-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(27,23,255,0.45); }
  #chatbot-btn svg { width: 26px; height: 26px; }
  #chatbot-box {
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 420px;
    height: 620px;
    background: #FFFFFF;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    display: none;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #chatbot-box.open { display: flex; }
  #chatbot-header {
    background: #1B17FF;
    color: #FFFFFF;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #chatbot-header-left { display: flex; align-items: center; gap: 10px; }
  #askly-logo { width: 28px; height: 28px; flex-shrink: 0; object-fit: contain; }
  #chatbot-title { font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }
  #chatbot-header-right { display: flex; align-items: center; gap: 6px; }
  #askly-lang-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #askly-lang-btn:hover { background: rgba(255,255,255,0.28); }
  #askly-lang-dropdown {
    display: none;
    position: fixed;
    background: #FFFFFF;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    z-index: 99999;
    min-width: 170px;
    overflow: hidden;
  }
  #askly-lang-dropdown.open { display: block; }
  .lang-option {
    padding: 10px 14px;
    font-size: 13px;
    color: #000000;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lang-option:hover { background: #f0f1ff; }
  .lang-option.active { background: #f0f1ff; color: #1B17FF; font-weight: 600; }
  .lang-option .lang-code {
    font-weight: 700;
    font-size: 11px;
    color: #1B17FF;
    background: #e8eaff;
    padding: 1px 6px;
    border-radius: 4px;
    min-width: 28px;
    text-align: center;
  }
  .lang-option.active .lang-code { background: #1B17FF; color: white; }
  #chatbot-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #chatbot-close:hover { background: rgba(255,255,255,0.25); }
  #chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #f7f8fc;
  }
  .msg-wrapper { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .msg-wrapper.user { align-items: flex-end; }
  .msg-wrapper.bot { align-items: flex-start; }
  .msg { max-width: 82%; padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .msg.bot { background: #FFFFFF; border: 1px solid #e8eaf0; border-bottom-left-radius: 4px; color: #000000; }
  .msg.user { background: #1B17FF; color: #FFFFFF; border-bottom-right-radius: 4px; }
  .msg a { color: #1B17FF; text-decoration: underline; word-break: break-word; }
  .msg-time { font-size: 10px; color: #b0b3c6; padding: 0 4px; }
  .msg-actions { display: flex; align-items: center; gap: 6px; padding: 0 2px; }
  .thumb-btn {
    background: none;
    border: 1.5px solid #c0c3d0;
    cursor: pointer;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    padding: 0;
  }
  .thumb-btn svg { width: 13px; height: 13px; fill: none; stroke: #c0c3d0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s, fill 0.2s; }
  .thumb-btn:hover { border-color: #000000; }
  .thumb-btn:hover svg { stroke: #000000; }
  .thumb-btn.active { background: #000000; border-color: #000000; }
  .thumb-btn.active svg { stroke: #ffffff; fill: #ffffff; }
  .speak-btn {
    background: none;
    border: 1.5px solid #c0c3d0;
    cursor: pointer;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    padding: 0;
  }
  .speak-btn svg { width: 13px; height: 13px; fill: none; stroke: #c0c3d0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
  .speak-btn:hover { border-color: #000000; }
  .speak-btn:hover svg { stroke: #000000; }
  .speak-btn.speaking { background: #000000; border-color: #000000; animation: speakPulse 1s infinite; }
  .speak-btn.speaking svg { stroke: #ffffff; }
  @keyframes speakPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(0,0,0,0); }
  }

  /* ── Voice Recorder Overlay ─────────────────────────────────────── */
  #voice-recorder {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #FFFFFF;
    border-top: 1px solid #e8eaf0;
    padding: 16px;
    z-index: 100;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  #voice-recorder.active { display: flex; }

  #voice-waveform {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f7f8fc;
    border-radius: 12px;
    padding: 10px 14px;
    border: 1.5px solid #e8eaf0;
  }
  #voice-waveform-bars {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }
  .waveform-bar {
    flex: 1;
    background: #1B17FF;
    border-radius: 3px;
    animation: waveAnim 0.8s ease-in-out infinite;
    min-height: 4px;
  }
  .waveform-bar:nth-child(1) { animation-delay: 0.0s; }
  .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
  .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
  .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
  .waveform-bar:nth-child(5) { animation-delay: 0.2s; }
  .waveform-bar:nth-child(6) { animation-delay: 0.1s; }
  .waveform-bar:nth-child(7) { animation-delay: 0.0s; }
  .waveform-bar:nth-child(8) { animation-delay: 0.15s; }
  .waveform-bar:nth-child(9) { animation-delay: 0.25s; }
  .waveform-bar:nth-child(10) { animation-delay: 0.05s; }
  .waveform-bar:nth-child(11) { animation-delay: 0.35s; }
  .waveform-bar:nth-child(12) { animation-delay: 0.1s; }
  @keyframes waveAnim {
    0%, 100% { height: 6px; }
    50% { height: 28px; }
  }
  #voice-timer {
    font-size: 13px;
    font-weight: 600;
    color: #000000;
    min-width: 36px;
    text-align: right;
  }
  #voice-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #voice-cancel {
    background: none;
    border: 1.5px solid #e0e0e0;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  #voice-cancel:hover { border-color: #e53935; background: #fff0f0; }
  #voice-cancel svg { width: 16px; height: 16px; stroke: #666; }
  #voice-cancel:hover svg { stroke: #e53935; }

  #voice-status {
    font-size: 12px;
    color: #b0b3c6;
    text-align: center;
    flex: 1;
  }
  #voice-confirm {
    background: #1B17FF;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }
  #voice-confirm:hover { background: #0e0acc; }
  #voice-confirm:active { transform: scale(0.95); }
  #voice-confirm svg { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; }

  #chatbot-footer { background: #FFFFFF; border-top: 1px solid #e8eaf0; flex-shrink: 0; position: relative; }
  #chatbot-input-row { display: flex; gap: 8px; padding: 12px; align-items: center; }
  #chatbot-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e8eaf0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #f7f8fc;
    transition: border 0.2s;
    color: #000000;
  }
  #chatbot-input:focus { border-color: #1B17FF; background: #FFFFFF; }
  #chatbot-send, #askly-mic-btn {
    background: #1B17FF;
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #chatbot-send:hover, #askly-mic-btn:hover { background: #0e0acc; }
  #chatbot-send:active, #askly-mic-btn:active { transform: scale(0.95); }
  #chatbot-send:disabled { opacity: 0.45; cursor: not-allowed; }
  #askly-mic-btn.recording { background: #e53935; animation: micPulse 1s infinite; }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.45); }
    50% { box-shadow: 0 0 0 6px rgba(229,57,53,0); }
  }
  #chatbot-branding { text-align: center; padding: 4px 0 8px; font-size: 11px; color: #b0b3c6; letter-spacing: 0.02em; }
  #chatbot-branding a { color: #1B17FF; font-weight: 600; text-decoration: none; }
  #chatbot-branding a:hover { text-decoration: underline; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #b0b3c6; margin: 0 2px; animation: bounce 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @media (max-height: 750px) { #chatbot-box { height: 85vh; bottom: 80px; } }
  @media (max-width: 460px) { #chatbot-box { width: calc(100vw - 24px); right: 12px; } }
</style>
</head>
<body>

<button id="chatbot-btn">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
  </svg>
</button>

<div id="chatbot-box">
  <div id="chatbot-header">
    <div id="chatbot-header-left">
      <img id="askly-logo" src="https://asklyteam-beep.github.io/chatbot-backend/logo%20.png" alt="Askly Logo"/>
      <span id="chatbot-title">Assistent</span>
    </div>
    <div id="chatbot-header-right">
      <button id="askly-lang-btn" title="Sprache wählen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button id="chatbot-close">✕</button>
    </div>
  </div>

  <div id="chatbot-messages">
    <div class="msg-wrapper bot">
      <div class="msg bot" id="welcome-msg"></div>
      <span class="msg-time" id="welcome-time"></span>
    </div>
  </div>

  <div id="chatbot-footer">
    <!-- Voice Recorder Overlay -->
    <div id="voice-recorder">
      <div id="voice-waveform">
        <div id="voice-waveform-bars">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>
        <span id="voice-timer">0:00</span>
      </div>
      <div id="voice-actions">
        <!-- Cancel -->
        <button id="voice-cancel" title="Abbrechen">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <span id="voice-status">Aufnahme läuft...</span>
        <!-- Confirm -->
        <button id="voice-confirm" title="Senden">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="chatbot-input-row">
      <input id="chatbot-input" type="text" />
      <button id="askly-mic-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button id="chatbot-send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="chatbot-branding">Powered by <a href="https://askly.ch" target="_blank">Askly</a></div>
  </div>
</div>

<div id="askly-lang-dropdown">
  <div class="lang-option active" data-lang="AUTO"><span class="lang-code">AUTO</span> Automatisch</div>
  <div class="lang-option" data-lang="DE"><span class="lang-code">DE</span> Deutsch</div>
  <div class="lang-option" data-lang="FR"><span class="lang-code">FR</span> Français</div>
  <div class="lang-option" data-lang="IT"><span class="lang-code">IT</span> Italiano</div>
  <div class="lang-option" data-lang="EN"><span class="lang-code">EN</span> English</div>
  <div class="lang-option" data-lang="CH"><span class="lang-code">CH</span> Schweizerdeutsch</div>
</div>

<script>
  const BACKEND = 'https://sweet-determination-production.up.railway.app';
  const WEBSITE_URL = 'https://www.meggen.ch';
  const BOT_NAME = 'Gemeinde Meggen Assistent';

  const UI_STRINGS = {
    AUTO: { welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.', placeholder: 'Ihre Frage...', error: 'Verbindungsfehler. Bitte erneut versuchen.', noAnswer: 'Keine Antwort erhalten.' },
    DE:   { welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.', placeholder: 'Ihre Frage...', error: 'Verbindungsfehler. Bitte erneut versuchen.', noAnswer: 'Keine Antwort erhalten.' },
    FR:   { welcome: 'Bonjour! Je réponds volontiers à vos questions sur la commune de Meggen.', placeholder: 'Votre question...', error: 'Erreur de connexion. Veuillez réessayer.', noAnswer: 'Aucune réponse reçue.' },
    IT:   { welcome: 'Salve! Sono felice di rispondere alle sue domande sul comune di Meggen.', placeholder: 'La sua domanda...', error: 'Errore di connessione. Riprovare.', noAnswer: 'Nessuna risposta ricevuta.' },
    EN:   { welcome: 'Hello! I am happy to answer your questions about the municipality of Meggen.', placeholder: 'Your question...', error: 'Connection error. Please try again.', noAnswer: 'No answer received.' },
    CH:   { welcome: 'Hoi! I beantworte gern Iri Frage zur Gmeinde Meggen.', placeholder: 'Iri Frag...', error: 'Verbindigsfehler. Bitte nomol versuche.', noAnswer: 'Kei Antwort erhalte.' },
  };

  const TTS_LANG_CODES = { AUTO: 'de-CH', DE: 'de-DE', FR: 'fr-FR', IT: 'it-IT', EN: 'en-GB', CH: 'de-CH' };
  const MIC_LANG_CODES = { AUTO: 'de-CH', DE: 'de-CH', FR: 'fr-CH', IT: 'it-CH', EN: 'en-GB', CH: 'de-CH' };

  let context = '';
  let siteUrl = '';
  let selectedLanguage = 'AUTO';
  let currentSpeech = null;
  let currentSpeakBtn = null;

  // ── Voice Recorder State ──────────────────────────────────────────
  let asklyRecognition = null;
  let asklyListening = false;
  let voiceTranscript = '';
  let voiceTimerInterval = null;
  let voiceSeconds = 0;

  const micBtn = document.getElementById('askly-mic-btn');
  const voiceRecorder = document.getElementById('voice-recorder');
  const voiceTimer = document.getElementById('voice-timer');
  const voiceCancel = document.getElementById('voice-cancel');
  const voiceConfirm = document.getElementById('voice-confirm');
  const voiceStatus = document.getElementById('voice-status');

  function formatTime(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function startVoiceTimer() {
    voiceSeconds = 0;
    voiceTimer.textContent = '0:00';
    voiceTimerInterval = setInterval(() => {
      voiceSeconds++;
      voiceTimer.textContent = formatTime(voiceSeconds);
    }, 1000);
  }

  function stopVoiceTimer() {
    clearInterval(voiceTimerInterval);
    voiceTimerInterval = null;
  }

  function showRecorder() {
    voiceRecorder.classList.add('active');
    micBtn.classList.add('recording');
    voiceStatus.textContent = 'Aufnahme läuft...';
    voiceTranscript = '';
    startVoiceTimer();
  }

  function hideRecorder() {
    voiceRecorder.classList.remove('active');
    micBtn.classList.remove('recording');
    stopVoiceTimer();
    voiceSeconds = 0;
    voiceTimer.textContent = '0:00';
    voiceTranscript = '';
  }

  function startVoiceRecognition() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Spracheingabe wird nur in Chrome/Edge unterstützt.');
      return;
    }
    const micLang = MIC_LANG_CODES[selectedLanguage] || 'de-CH';
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    asklyRecognition = new SpeechRecognition();
    asklyRecognition.lang = micLang;
    asklyRecognition.interimResults = true;
    asklyRecognition.continuous = true;
    asklyRecognition.maxAlternatives = 1;

    asklyRecognition.onstart = () => {
      asklyListening = true;
      showRecorder();
    };

    asklyRecognition.onresult = (event) => {
      let interim = '';
      let final = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript;
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      if (final) voiceTranscript += final;
      voiceStatus.textContent = voiceTranscript + interim || 'Aufnahme läuft...';
    };

    asklyRecognition.onerror = () => {
      asklyListening = false;
      hideRecorder();
    };

    asklyRecognition.onend = () => {
      asklyListening = false;
    };

    asklyRecognition.start();
  }

  function stopAndCancel() {
    if (asklyRecognition) asklyRecognition.stop();
    asklyListening = false;
    hideRecorder();
  }

  function stopAndConfirm() {
    if (asklyRecognition) asklyRecognition.stop();
    asklyListening = false;
    hideRecorder();
    if (voiceTranscript.trim()) {
      document.getElementById('chatbot-input').value = voiceTranscript.trim();
      send();
    }
  }

  micBtn.onclick = () => {
    if (asklyListening) {
      stopAndCancel();
    } else {
      startVoiceRecognition();
    }
  };

  voiceCancel.onclick = stopAndCancel;
  voiceConfirm.onclick = stopAndConfirm;

  // ── Zeitstempel ───────────────────────────────────────────────────
  function getTimestamp() {
    const now = new Date();
    return now.toLocaleDateString('de-CH', { weekday: 'short', day: '2-digit', month: '2-digit' })
      + ', ' + now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  }

  function applyLanguage(lang) {
    const strings = UI_STRINGS[lang] || UI_STRINGS['DE'];
    document.getElementById('welcome-msg').textContent = strings.welcome;
    document.getElementById('chatbot-input').placeholder = strings.placeholder;
    document.getElementById('welcome-time').textContent = getTimestamp();
  }

  document.getElementById('chatbot-title').textContent = BOT_NAME;
  applyLanguage('AUTO');

  async function loadContext() {
    try {
      const res = await fetch(`${BACKEND}/api/scrape?url=${encodeURIComponent(WEBSITE_URL)}`);
      const data = await res.json();
      context = data.text || '';
      siteUrl = data.siteUrl || WEBSITE_URL;
    } catch(e) { context = ''; siteUrl = WEBSITE_URL; }
  }

  // ── Vorlesen ──────────────────────────────────────────────────────
  function speakText(text, btn) {
    if (!window.speechSynthesis) return;
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      if (currentSpeakBtn) { currentSpeakBtn.classList.remove('speaking'); currentSpeakBtn = null; }
      if (btn === currentSpeakBtn || btn.classList.contains('speaking')) return;
    }
    const cleanText = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = TTS_LANG_CODES[selectedLanguage] || 'de-DE';
    utterance.rate = 1.0;
    utterance.onstart = () => { btn.classList.add('speaking'); currentSpeakBtn = btn; };
    utterance.onend = () => { btn.classList.remove('speaking'); currentSpeakBtn = null; currentSpeech = null; };
    utterance.onerror = () => { btn.classList.remove('speaking'); currentSpeakBtn = null; currentSpeech = null; };
    currentSpeech = utterance;
    window.speechSynthesis.speak(utterance);
  }

  // ── Nachrichten ───────────────────────────────────────────────────
  function addMsg(html, type, withActions = false) {
    const box = document.getElementById('chatbot-messages');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper ' + type;

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + type;
    bubble.innerHTML = html;
    wrapper.appendChild(bubble);

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTimestamp();
    wrapper.appendChild(time);

    if (type === 'bot' && withActions) {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const thumbUp = document.createElement('button');
      thumbUp.className = 'thumb-btn';
      thumbUp.title = 'Hilfreich';
      thumbUp.innerHTML = `<svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`;

      const thumbDown = document.createElement('button');
      thumbDown.className = 'thumb-btn';
      thumbDown.title = 'Nicht hilfreich';
      thumbDown.innerHTML = `<svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>`;

      thumbUp.onclick = () => { thumbUp.classList.toggle('active', !thumbUp.classList.contains('active')); thumbDown.classList.remove('active'); };
      thumbDown.onclick = () => { thumbDown.classList.toggle('active', !thumbDown.classList.contains('active')); thumbUp.classList.remove('active'); };

      const speakBtn = document.createElement('button');
      speakBtn.className = 'speak-btn';
      speakBtn.title = 'Vorlesen';
      speakBtn.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
      speakBtn.onclick = () => speakText(bubble.innerHTML, speakBtn);

      actions.appendChild(thumbUp);
      actions.appendChild(thumbDown);
      actions.appendChild(speakBtn);
      wrapper.appendChild(actions);
    }

    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  function cleanReply(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/#{1,3} /g, '')
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<"]+)/g, (url) => {
        try {
          const { pathname } = new URL(url);
          const segments = pathname.split('/').filter(Boolean);
          const label = segments.length > 0
            ? decodeURIComponent(segments[segments.length - 1]).replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
            : url;
          return `<a href="${url}" target="_blank" rel="noopener">${label}</a>`;
        } catch { return `<a href="${url}" target="_blank" rel="noopener">${url}</a>`; }
      });
  }

  async function send() {
    const input = document.getElementById('chatbot-input');
    const btn = document.getElementById('chatbot-send');
    const text = input.value.trim();
    if (!text) return;
    const strings = UI_STRINGS[selectedLanguage] || UI_STRINGS['DE'];
    input.value = '';
    btn.disabled = true;
    addMsg(text, 'user');
    const loading = addMsg('<span class="dot"></span><span class="dot"></span><span class="dot"></span>', 'bot');
    try {
      const res = await fetch(`${BACKEND}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, context, siteUrl, language: selectedLanguage })
      });
      const data = await res.json();
      const replyHtml = cleanReply(data.reply || strings.noAnswer);
      loading.parentElement.remove();
      addMsg(replyHtml, 'bot', true);
    } catch(e) {
      loading.innerHTML = strings.error;
    }
    btn.disabled = false;
  }

  // ── Sprachumschalter ──────────────────────────────────────────────
  const langBtn = document.getElementById('askly-lang-btn');
  const langDropdown = document.getElementById('askly-lang-dropdown');

  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const rect = langBtn.getBoundingClientRect();
    langDropdown.style.top = (rect.bottom + 8) + 'px';
    langDropdown.style.right = (window.innerWidth - rect.right) + 'px';
    langDropdown.classList.toggle('open');
  });

  document.querySelectorAll('.lang-option').forEach(option => {
    option.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedLanguage = option.dataset.lang;
      document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
      option.classList.add('active');
      langDropdown.classList.remove('open');
      applyLanguage(selectedLanguage);
    });
  });

  document.addEventListener('click', () => langDropdown.classList.remove('open'));

  document.getElementById('chatbot-btn').onclick = () => {
    document.getElementById('chatbot-box').classList.toggle('open');
    if (!context) loadContext();
  };
  document.getElementById('chatbot-close').onclick = () => {
    document.getElementById('chatbot-box').classList.remove('open');
    langDropdown.classList.remove('open');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (asklyListening) stopAndCancel();
  };
  document.getElementById('chatbot-send').onclick = send;
  document.getElementById('chatbot-input').onkeydown = e => { if (e.key === 'Enter') send(); };
</script>
</body>
</html>
