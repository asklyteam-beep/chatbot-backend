<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Widget</title>
<style>
  #chatbot-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #2D2FFF;
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(45,47,255,0.35);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #chatbot-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 20px rgba(45,47,255,0.45);
  }
  #chatbot-btn svg { width: 26px; height: 26px; }
  #chatbot-box {
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    display: none;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #chatbot-box.open { display: flex; }
  #chatbot-header {
    background: #2D2FFF;
    color: white;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  #chatbot-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #askly-logo { width: 28px; height: 28px; flex-shrink: 0; }
  #chatbot-title { font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }
  #chatbot-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #chatbot-close:hover { background: rgba(255,255,255,0.25); }
  #chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f7f8fc;
  }
  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.bot {
    background: white;
    border: 1px solid #e8eaf0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    color: #1a1a2e;
  }
  .msg.user {
    background: #2D2FFF;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg a { color: #2D2FFF; text-decoration: underline; word-break: break-word; }
  #chatbot-footer { background: white; border-top: 1px solid #e8eaf0; }
  #chatbot-input-row { display: flex; gap: 8px; padding: 12px; align-items: center; }
  #chatbot-input {
    flex: 1;
    padding: 9px 13px;
    border: 1.5px solid #e8eaf0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #f7f8fc;
    transition: border 0.2s;
    color: #1a1a2e;
  }
  #chatbot-input:focus { border-color: #2D2FFF; background: white; }

  /* Mikrofon-Button */
  #askly-mic-btn {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #askly-mic-btn:hover { background: #f0f0f0; }
  #askly-mic-btn.listening {
    animation: micPulse 1s infinite;
    color: red;
  }
  @keyframes micPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  /* Sprachauswahl-Badge */
  #askly-lang-badge {
    font-size: 10px;
    color: #2D2FFF;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 5px;
    border: 1.5px solid #2D2FFF;
    border-radius: 6px;
    flex-shrink: 0;
    user-select: none;
    transition: background 0.2s, color 0.2s;
  }
  #askly-lang-badge:hover { background: #2D2FFF; color: white; }

  #chatbot-send {
    background: #2D2FFF;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #chatbot-send:hover { background: #1a1ccc; }
  #chatbot-send:active { transform: scale(0.95); }
  #chatbot-send:disabled { opacity: 0.45; cursor: not-allowed; }
  #chatbot-branding {
    text-align: center;
    padding: 4px 0 8px;
    font-size: 11px;
    color: #b0b3c6;
    letter-spacing: 0.02em;
  }
  #chatbot-branding a { color: #2D2FFF; font-weight: 600; text-decoration: none; }
  #chatbot-branding a:hover { text-decoration: underline; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #b0b3c6;
    margin: 0 2px;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<button id="chatbot-btn">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
  </svg>
</button>

<div id="chatbot-box">
  <div id="chatbot-header">
    <div id="chatbot-header-left">
      <!-- Askly Blume Logo -->
      <svg id="askly-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(0 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(120 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(180 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(240 50 50)"/>
        <ellipse cx="50" cy="20" rx="12" ry="20" fill="white" transform="rotate(300 50 50)"/>
        <circle cx="50" cy="50" r="10" fill="white"/>
      </svg>
      <span id="chatbot-title">Assistent</span>
    </div>
    <button id="chatbot-close">✕</button>
  </div>
  <div id="chatbot-messages">
    <div class="msg bot" id="welcome-msg">Hallo! Wie kann ich Ihnen helfen?</div>
  </div>
  <div id="chatbot-footer">
    <div id="chatbot-input-row">
      <input id="chatbot-input" type="text" placeholder="Ihre Frage..." />
      <button id="askly-mic-btn" title="Spracheingabe starten">🎤</button>
      <span id="askly-lang-badge" title="Sprache wechseln">DE</span>
      <button id="chatbot-send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="chatbot-branding">Powered by <a href="https://askly.ch" target="_blank">Askly</a></div>
  </div>
</div>

<script>
  const BACKEND = 'https://sweet-determination-production.up.railway.app';
  const WEBSITE_URL = 'https://www.meggen.ch';
  const BOT_NAME = 'Gemeinde Meggen Assistent';
  const WELCOME_MSG = 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.';

  document.getElementById('chatbot-title').textContent = BOT_NAME;
  document.getElementById('welcome-msg').textContent = WELCOME_MSG;

  let context = '';
  let siteUrl = '';

  async function loadContext() {
    try {
      const res = await fetch(`${BACKEND}/api/scrape?url=${encodeURIComponent(WEBSITE_URL)}`);
      const data = await res.json();
      context = data.text || '';
      siteUrl = data.siteUrl || WEBSITE_URL;
    } catch(e) {
      context = '';
      siteUrl = WEBSITE_URL;
    }
  }

  function addMsg(html, type) {
    const box = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = html;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  function cleanReply(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/#{1,3} /g, '')
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank">$1</a>');
  }

  async function send() {
    const input = document.getElementById('chatbot-input');
    const btn = document.getElementById('chatbot-send');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    btn.disabled = true;
    addMsg(text, 'user');
    const loading = addMsg('<span class="dot"></span><span class="dot"></span><span class="dot"></span>', 'bot');
    try {
      const res = await fetch(`${BACKEND}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, context, siteUrl })
      });
      const data = await res.json();
      loading.innerHTML = cleanReply(data.reply || 'Keine Antwort erhalten.');
    } catch(e) {
      loading.innerHTML = 'Verbindungsfehler. Bitte erneut versuchen.';
    }
    btn.disabled = false;
  }

  document.getElementById('chatbot-btn').onclick = () => {
    document.getElementById('chatbot-box').classList.toggle('open');
    if (!context) loadContext();
  };
  document.getElementById('chatbot-close').onclick = () => {
    document.getElementById('chatbot-box').classList.remove('open');
  };
  document.getElementById('chatbot-send').onclick = send;
  document.getElementById('chatbot-input').onkeydown = e => {
    if (e.key === 'Enter') send();
  };

  // ── Askly Spracheingabe ──────────────────────────────────────────
  const ASKLY_LANGUAGES = [
    { label: 'DE', code: 'de-CH' },
    { label: 'FR', code: 'fr-CH' },
    { label: 'IT', code: 'it-CH' },
    { label: 'EN', code: 'en-GB' },
    { label: 'CH', code: 'de-CH' }  // Schweizerdeutsch → de-CH als Fallback
  ];
  let asklyLangIndex = 0;
  let asklyRecognition = null;
  let asklyListening = false;

  const micBtn = document.getElementById('askly-mic-btn');
  const langBadge = document.getElementById('askly-lang-badge');

  function updateLangBadge() {
    langBadge.textContent = ASKLY_LANGUAGES[asklyLangIndex].label;
  }

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Spracheingabe wird nur in Chrome/Edge unterstützt.');
      return;
    }
    if (asklyListening) {
      asklyRecognition.stop();
      return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    asklyRecognition = new SpeechRecognition();
    asklyRecognition.lang = ASKLY_LANGUAGES[asklyLangIndex].code;
    asklyRecognition.interimResults = false;
    asklyRecognition.maxAlternatives = 1;

    asklyRecognition.onstart = () => {
      asklyListening = true;
      micBtn.classList.add('listening');
      micBtn.title = 'Aufnahme läuft – klicken zum Stoppen';
    };

    asklyRecognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      document.getElementById('chatbot-input').value = transcript;
      document.getElementById('chatbot-input').focus();
      // Direkt absenden nach Spracheingabe:
      send();
    };

    asklyRecognition.onerror = (event) => {
      console.warn('Mic Fehler:', event.error);
      asklyListening = false;
      micBtn.classList.remove('listening');
    };

    asklyRecognition.onend = () => {
      asklyListening = false;
      micBtn.classList.remove('listening');
      micBtn.title = 'Spracheingabe starten';
    };

    asklyRecognition.start();
  }

  micBtn.onclick = toggleMic;

  // Sprache wechseln via Badge-Klick
  langBadge.onclick = () => {
    asklyLangIndex = (asklyLangIndex + 1) % ASKLY_LANGUAGES.length;
    updateLangBadge();
  };

  updateLangBadge();
  // ────────────────────────────────────────────────────────────────
</script>
</body>
</html>
