<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Widget</title>
<style>
  #chatbot-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1B17FF;
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(27,23,255,0.35);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #chatbot-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(27,23,255,0.45); }
  #chatbot-btn svg { width: 26px; height: 26px; }

  #chatbot-box {
    position: fixed;
    bottom: 90px;
    right: 24px;
    width: 420px;
    height: 620px;
    background: #FFFFFF;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    display: none;
    flex-direction: column;
    z-index: 9999;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #chatbot-box.open { display: flex; }

  #chatbot-header {
    background: #1B17FF;
    color: #FFFFFF;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #chatbot-header-left { display: flex; align-items: center; gap: 10px; }
  #askly-logo { width: 28px; height: 28px; flex-shrink: 0; object-fit: contain; }
  #chatbot-title { font-weight: 600; font-size: 15px; letter-spacing: 0.01em; }
  #chatbot-header-right { display: flex; align-items: center; gap: 6px; }

  #askly-lang-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #askly-lang-btn:hover { background: rgba(255,255,255,0.28); }

  #askly-lang-dropdown {
    display: none;
    position: fixed;
    background: #FFFFFF;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    z-index: 99999;
    min-width: 170px;
    overflow: hidden;
  }
  #askly-lang-dropdown.open { display: block; }

  .lang-option {
    padding: 10px 14px;
    font-size: 13px;
    color: #000000;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lang-option:hover { background: #f0f1ff; }
  .lang-option.active { background: #f0f1ff; color: #1B17FF; font-weight: 600; }
  .lang-option .lang-code {
    font-weight: 700;
    font-size: 11px;
    color: #1B17FF;
    background: #e8eaff;
    padding: 1px 6px;
    border-radius: 4px;
    min-width: 28px;
    text-align: center;
  }
  .lang-option.active .lang-code { background: #1B17FF; color: white; }

  #chatbot-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #chatbot-close:hover { background: rgba(255,255,255,0.25); }

  #chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #f7f8fc;
    -webkit-overflow-scrolling: touch;
  }

  .msg-wrapper { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .msg-wrapper.user { align-items: flex-end; }
  .msg-wrapper.bot { align-items: flex-start; }

  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    overflow-wrap: break-word;
  }
  .msg.bot { background: #FFFFFF; border: 1px solid #e8eaf0; border-bottom-left-radius: 4px; color: #000000; }
  .msg.user { background: #1B17FF; color: #FFFFFF; border-bottom-right-radius: 4px; }
  .msg a { color: #1B17FF; text-decoration: underline; word-break: break-word; }
  .msg-time { font-size: 10px; color: #b0b3c6; padding: 0 4px; }
  .msg-actions { display: flex; align-items: center; gap: 8px; padding: 2px 4px; }

  .thumb-btn, .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .thumb-btn svg, .speak-btn svg {
    width: 17px;
    height: 17px;
    fill: none;
    stroke: #c0c3d0;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s, fill 0.2s;
  }
  .thumb-btn:hover svg, .thumb-btn:active svg { stroke: #000000; }
  .speak-btn:hover svg, .speak-btn:active svg { stroke: #000000; }
  .thumb-btn:hover, .speak-btn:hover { transform: scale(1.15); }
  .thumb-btn.active svg { stroke: #000000; fill: #000000; }
  .speak-btn.speaking svg { stroke: #1B17FF; }
  .speak-btn.speaking { animation: speakPulse 1s infinite; }
  @keyframes speakPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* ── Voice Recorder ─────────────────────────────────────────────── */
  #voice-recorder {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #FFFFFF;
    border-top: 1px solid #e8eaf0;
    padding: 16px;
    z-index: 100;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  #voice-recorder.active { display: flex; }
  #voice-waveform {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f7f8fc;
    border-radius: 12px;
    padding: 10px 14px;
    border: 1.5px solid #e8eaf0;
  }
  #voice-waveform-bars {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
  }
  .waveform-bar {
    flex: 1;
    background: #1B17FF;
    border-radius: 3px;
    height: 4px;
    transition: height 0.08s ease;
  }
  #voice-timer { font-size: 13px; font-weight: 600; color: #000000; min-width: 36px; text-align: right; }
  #voice-actions { display: flex; align-items: center; justify-content: space-between; }
  #voice-cancel {
    background: none;
    border: 1.5px solid #e0e0e0;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #voice-cancel:hover { border-color: #e53935; background: #fff0f0; }
  #voice-cancel svg { width: 16px; height: 16px; stroke: #666; stroke-width: 2; stroke-linecap: round; fill: none; }
  #voice-cancel:hover svg { stroke: #e53935; }
  #voice-status { font-size: 12px; color: #b0b3c6; text-align: center; flex: 1; padding: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #voice-confirm {
    background: #1B17FF;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #voice-confirm:hover { background: #0e0acc; }
  #voice-confirm:active { transform: scale(0.95); }
  #voice-confirm svg { width: 18px; height: 18px; stroke: white; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  #chatbot-footer { background: #FFFFFF; border-top: 1px solid #e8eaf0; flex-shrink: 0; position: relative; }
  #chatbot-input-row { display: flex; gap: 8px; padding: 12px; align-items: center; }
  #chatbot-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #e8eaf0;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    background: #f7f8fc;
    transition: border 0.2s;
    color: #000000;
    -webkit-appearance: none;
    appearance: none;
  }
  #chatbot-input:focus { border-color: #1B17FF; background: #FFFFFF; }

  #chatbot-send, #askly-mic-btn {
    background: #1B17FF;
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #chatbot-send:hover, #askly-mic-btn:hover { background: #0e0acc; }
  #chatbot-send:active, #askly-mic-btn:active { transform: scale(0.95); }
  #chatbot-send:disabled { opacity: 0.45; cursor: not-allowed; }
  #askly-mic-btn.recording { background: #e53935; animation: micPulse 1s infinite; }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,57,53,0.45); }
    50% { box-shadow: 0 0 0 6px rgba(229,57,53,0); }
  }

  #chatbot-branding { text-align: center; padding: 4px 0 8px; font-size: 11px; color: #b0b3c6; letter-spacing: 0.02em; }
  #chatbot-branding a { color: #1B17FF; font-weight: 600; text-decoration: none; }
  #chatbot-branding a:hover { text-decoration: underline; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #b0b3c6; margin: 0 2px; animation: bounce 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* ── Mobile: Bottom Sheet ──────────────────────────────────────── */
  @media (max-width: 480px) {
    #chatbot-box {
      width: 100vw;
      height: 88vh;
      bottom: 0;
      right: 0;
      left: 0;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
    }
    #chatbot-btn {
      bottom: 16px;
      right: 16px;
      width: 52px;
      height: 52px;
    }
    #chatbot-header {
      padding: 16px 16px 14px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    #chatbot-input-row {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    #chatbot-branding {
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }
    .msg { max-width: 88%; font-size: 15px; }
  }

  @media (max-width: 380px) {
    #chatbot-box { height: 92vh; }
    #chatbot-input { font-size: 16px; } /* Verhindert iOS Auto-Zoom */
  }

  @media (max-height: 650px) and (max-width: 480px) {
    #chatbot-box { height: 96vh; }
  }
</style>
</head>
<body>

<button id="chatbot-btn" aria-label="Chat öffnen">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="white"/>
  </svg>
</button>

<div id="chatbot-box" role="dialog" aria-label="Askly Chatbot" aria-modal="true">
  <div id="chatbot-header">
    <div id="chatbot-header-left">
      <img id="askly-logo" src="https://asklyteam-beep.github.io/chatbot-backend/logo%20.png" alt="Askly Logo" crossorigin="anonymous"/>
      <span id="chatbot-title">Assistent</span>
    </div>
    <div id="chatbot-header-right">
      <button id="askly-lang-btn" title="Sprache wählen" aria-label="Sprache wählen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </button>
      <button id="chatbot-close" aria-label="Chat schliessen">✕</button>
    </div>
  </div>

  <div id="chatbot-messages" role="log" aria-live="polite" aria-label="Chatverlauf">
    <div class="msg-wrapper bot">
      <div class="msg bot" id="welcome-msg"></div>
      <span class="msg-time" id="welcome-time"></span>
    </div>
  </div>

  <div id="chatbot-footer">
    <div id="voice-recorder" aria-hidden="true">
      <div id="voice-waveform">
        <div id="voice-waveform-bars" aria-hidden="true">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>
        <span id="voice-timer">0:00</span>
      </div>
      <div id="voice-actions">
        <button id="voice-cancel" title="Abbrechen" aria-label="Aufnahme abbrechen">
          <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <span id="voice-status" aria-live="polite">Aufnahme läuft...</span>
        <button id="voice-confirm" title="Senden" aria-label="Aufnahme senden">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
    </div>

    <div id="chatbot-input-row">
      <input
        id="chatbot-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        maxlength="500"
        aria-label="Nachricht eingeben"
      />
      <button id="askly-mic-btn" aria-label="Spracheingabe starten">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button id="chatbot-send" aria-label="Nachricht senden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="chatbot-branding">Powered by <a href="https://askly.ch" target="_blank" rel="noopener noreferrer">Askly</a></div>
  </div>
</div>

<div id="askly-lang-dropdown" role="listbox" aria-label="Sprachauswahl">
  <div class="lang-option active" data-lang="AUTO" role="option" aria-selected="true"><span class="lang-code">AUTO</span> Automatisch</div>
  <div class="lang-option" data-lang="DE" role="option" aria-selected="false"><span class="lang-code">DE</span> Deutsch</div>
  <div class="lang-option" data-lang="FR" role="option" aria-selected="false"><span class="lang-code">FR</span> Français</div>
  <div class="lang-option" data-lang="IT" role="option" aria-selected="false"><span class="lang-code">IT</span> Italiano</div>
  <div class="lang-option" data-lang="EN" role="option" aria-selected="false"><span class="lang-code">EN</span> English</div>
  <div class="lang-option" data-lang="CH" role="option" aria-selected="false"><span class="lang-code">CH</span> Schweizerdeutsch</div>
</div>

<script>
  // ── Sicherheit: Nur erlaubter Backend-Host ────────────────────────
  const ALLOWED_BACKEND = 'https://sweet-determination-production.up.railway.app';
  const BACKEND = ALLOWED_BACKEND;
  const WEBSITE_URL = 'https://www.meggen.ch';
  const BOT_NAME = 'Gemeinde Meggen Assistent';
  const CLIENT_CACHE_TTL = 6 * 60 * 60 * 1000;
  const MAX_MESSAGE_LENGTH = 500;

  // Erlaubte Sprachen — verhindert Injection via data-lang
  const ALLOWED_LANGUAGES = new Set(['AUTO', 'DE', 'FR', 'IT', 'EN', 'CH']);

  const UI_STRINGS = {
    AUTO: { welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.', placeholder: 'Ihre Frage...', error: 'Verbindungsfehler. Bitte erneut versuchen.', noAnswer: 'Keine Antwort erhalten.' },
    DE:   { welcome: 'Hallo! Ich beantworte gerne Ihre Fragen zur Gemeinde Meggen.', placeholder: 'Ihre Frage...', error: 'Verbindungsfehler. Bitte erneut versuchen.', noAnswer: 'Keine Antwort erhalten.' },
    FR:   { welcome: 'Bonjour! Je réponds volontiers à vos questions sur la commune de Meggen.', placeholder: 'Votre question...', error: 'Erreur de connexion. Veuillez réessayer.', noAnswer: 'Aucune réponse reçue.' },
    IT:   { welcome: 'Salve! Sono felice di rispondere alle sue domande sul comune di Meggen.', placeholder: 'La sua domanda...', error: 'Errore di connessione. Riprovare.', noAnswer: 'Nessuna risposta ricevuta.' },
    EN:   { welcome: 'Hello! I am happy to answer your questions about the municipality of Meggen.', placeholder: 'Your question...', error: 'Connection error. Please try again.', noAnswer: 'No answer received.' },
    CH:   { welcome: 'Hoi! I beantworte gern Iri Frage zur Gmeinde Meggen.', placeholder: 'Iri Frag...', error: 'Verbindigsfehler. Bitte nomol versuche.', noAnswer: 'Kei Antwort erhalte.' },
  };

  const TTS_LANG_CODES = { AUTO: 'de-CH', DE: 'de-DE', FR: 'fr-FR', IT: 'it-IT', EN: 'en-GB', CH: 'de-CH' };
  const MIC_LANG_CODES = { AUTO: 'de-CH', DE: 'de-CH', FR: 'fr-CH', IT: 'it-CH', EN: 'en-GB', CH: 'de-CH' };

  let context = '';
  let siteUrl = '';
  let selectedLanguage = 'AUTO';
  let currentSpeech = null;
  let currentSpeakBtn = null;
  let clientCache = null;
  let clientCacheTime = 0;
  let isSending = false;

  // ── Sicherheit: XSS-Schutz ───────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // Sichere URL-Validierung — nur http/https erlaubt
  function isSafeUrl(url) {
    try {
      const parsed = new URL(url);
      return parsed.protocol === 'https:' || parsed.protocol === 'http:';
    } catch { return false; }
  }

  // ── Context laden ─────────────────────────────────────────────────
  async function loadContext() {
    if (clientCache && (Date.now() - clientCacheTime) < CLIENT_CACHE_TTL) {
      context = clientCache.text || '';
      siteUrl = clientCache.siteUrl || WEBSITE_URL;
      return;
    }
    try {
      const url = new URL(`${BACKEND}/api/scrape`);
      url.searchParams.set('url', WEBSITE_URL);
      const res = await fetch(url.toString(), {
        method: 'GET',
        headers: { 'Accept': 'application/json' },
      });
      if (!res.ok) throw new Error('Scrape failed');
      const data = await res.json();
      context = typeof data.text === 'string' ? data.text : '';
      siteUrl = typeof data.siteUrl === 'string' ? data.siteUrl : WEBSITE_URL;
      clientCache = data;
      clientCacheTime = Date.now();
    } catch(e) {
      context = '';
      siteUrl = WEBSITE_URL;
    }
  }

  // ── Voice Recorder ────────────────────────────────────────────────
  let asklyRecognition = null;
  let asklyListening = false;
  let voiceTranscript = '';
  let voiceTimerInterval = null;
  let voiceSeconds = 0;
  let confirmPending = false;
  let audioContext = null;
  let analyser = null;
  let micStream = null;
  let animationFrame = null;

  const micBtn = document.getElementById('askly-mic-btn');
  const voiceRecorder = document.getElementById('voice-recorder');
  const voiceTimer = document.getElementById('voice-timer');
  const voiceCancel = document.getElementById('voice-cancel');
  const voiceConfirm = document.getElementById('voice-confirm');
  const voiceStatus = document.getElementById('voice-status');
  const waveformBars = document.querySelectorAll('.waveform-bar');

  function formatTime(s) {
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function startVoiceTimer() {
    voiceSeconds = 0;
    voiceTimer.textContent = '0:00';
    voiceTimerInterval = setInterval(() => { voiceSeconds++; voiceTimer.textContent = formatTime(voiceSeconds); }, 1000);
  }

  function stopVoiceTimer() {
    clearInterval(voiceTimerInterval);
    voiceTimerInterval = null;
  }

  function startWaveformAnalysis(stream) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.5;
      const source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      function draw() {
        animationFrame = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.slice(0, 60).reduce((a, b) => a + b, 0) / 60;
        waveformBars.forEach((bar, i) => {
          const noise = Math.sin(Date.now() / 180 + i * 0.8) * 0.4 + 0.6;
          const height = Math.max(4, Math.min(30, (avg / 128) * 32 * noise));
          bar.style.height = height + 'px';
        });
      }
      draw();
    } catch(e) { console.warn('Waveform analysis failed:', e); }
  }

  function stopWaveformAnalysis() {
    if (animationFrame) { cancelAnimationFrame(animationFrame); animationFrame = null; }
    if (audioContext) { try { audioContext.close(); } catch(e) {} audioContext = null; }
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    waveformBars.forEach(bar => { bar.style.height = '4px'; });
  }

  function showRecorder() {
    voiceRecorder.classList.add('active');
    voiceRecorder.setAttribute('aria-hidden', 'false');
    micBtn.classList.add('recording');
    micBtn.setAttribute('aria-label', 'Aufnahme stoppen');
    voiceStatus.textContent = 'Aufnahme läuft...';
    voiceTranscript = '';
    confirmPending = false;
    startVoiceTimer();
  }

  function hideRecorder() {
    voiceRecorder.classList.remove('active');
    voiceRecorder.setAttribute('aria-hidden', 'true');
    micBtn.classList.remove('recording');
    micBtn.setAttribute('aria-label', 'Spracheingabe starten');
    stopVoiceTimer();
    stopWaveformAnalysis();
    voiceSeconds = 0;
    voiceTimer.textContent = '0:00';
    voiceTranscript = '';
    confirmPending = false;
  }

  async function startVoiceRecognition() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      alert('Spracheingabe wird nur in Chrome/Edge unterstützt.');
      return;
    }
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      startWaveformAnalysis(micStream);
    } catch(e) { console.warn('Mikrofon-Zugriff fehlgeschlagen:', e); }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    asklyRecognition = new SpeechRecognition();
    asklyRecognition.lang = MIC_LANG_CODES[selectedLanguage] || 'de-CH';
    asklyRecognition.interimResults = true;
    asklyRecognition.continuous = true;
    asklyRecognition.maxAlternatives = 1;

    asklyRecognition.onstart = () => { asklyListening = true; showRecorder(); };
    asklyRecognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          voiceTranscript += event.results[i][0].transcript + ' ';
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      // Sicherheit: Transcript auf 500 Zeichen begrenzen
      voiceTranscript = voiceTranscript.slice(0, MAX_MESSAGE_LENGTH);
      voiceStatus.textContent = (voiceTranscript + interim).trim().slice(0, 100) || 'Aufnahme läuft...';
    };
    asklyRecognition.onerror = () => { asklyListening = false; hideRecorder(); };
    asklyRecognition.onend = () => {
      asklyListening = false;
      if (confirmPending) {
        const text = voiceTranscript.trim().slice(0, MAX_MESSAGE_LENGTH);
        hideRecorder();
        if (text) {
          document.getElementById('chatbot-input').value = text;
          send();
        }
      }
    };
    asklyRecognition.start();
  }

  function stopAndCancel() {
    confirmPending = false;
    if (asklyRecognition) { try { asklyRecognition.stop(); } catch(e) {} }
    asklyListening = false;
    hideRecorder();
  }

  function stopAndConfirm() {
    confirmPending = true;
    stopVoiceTimer();
    stopWaveformAnalysis();
    voiceRecorder.classList.remove('active');
    micBtn.classList.remove('recording');
    if (asklyRecognition) { try { asklyRecognition.stop(); } catch(e) { hideRecorder(); } }
    else { hideRecorder(); }
  }

  micBtn.onclick = () => { if (asklyListening) { stopAndCancel(); } else { startVoiceRecognition(); } };
  voiceCancel.onclick = stopAndCancel;
  voiceConfirm.onclick = stopAndConfirm;

  // ── Zeitstempel ───────────────────────────────────────────────────
  function getTimestamp() {
    const now = new Date();
    return now.toLocaleDateString('de-CH', { weekday: 'short', day: '2-digit', month: '2-digit' })
      + ', ' + now.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
  }

  function applyLanguage(lang) {
    if (!ALLOWED_LANGUAGES.has(lang)) lang = 'AUTO';
    const strings = UI_STRINGS[lang] || UI_STRINGS['DE'];
    document.getElementById('welcome-msg').textContent = strings.welcome;
    document.getElementById('chatbot-input').placeholder = strings.placeholder;
    document.getElementById('welcome-time').textContent = getTimestamp();
  }

  document.getElementById('chatbot-title').textContent = BOT_NAME;
  applyLanguage('AUTO');

  // ── Vorlesen ──────────────────────────────────────────────────────
  function speakText(text, btn) {
    if (!window.speechSynthesis) return;
    if (window.speechSynthesis.speaking) {
      window.speechSynthesis.cancel();
      if (currentSpeakBtn) { currentSpeakBtn.classList.remove('speaking'); currentSpeakBtn = null; }
      if (btn.classList.contains('speaking')) return;
    }
    const cleanText = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 2000);
    if (!cleanText) return;
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = TTS_LANG_CODES[selectedLanguage] || 'de-DE';
    utterance.rate = 1.0;
    utterance.onstart = () => { btn.classList.add('speaking'); currentSpeakBtn = btn; };
    utterance.onend = () => { btn.classList.remove('speaking'); currentSpeakBtn = null; currentSpeech = null; };
    utterance.onerror = () => { btn.classList.remove('speaking'); currentSpeakBtn = null; currentSpeech = null; };
    currentSpeech = utterance;
    window.speechSynthesis.speak(utterance);
  }

  // ── Nachrichten ───────────────────────────────────────────────────
  function addMsg(html, type, withActions = false) {
    const box = document.getElementById('chatbot-messages');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg-wrapper ' + (type === 'user' ? 'user' : 'bot');

    const bubble = document.createElement('div');
    bubble.className = 'msg ' + (type === 'user' ? 'user' : 'bot');
    bubble.innerHTML = html; // HTML wird nur für Bot-Antworten verwendet (cleanReply sanitized)
    wrapper.appendChild(bubble);

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTimestamp();
    wrapper.appendChild(time);

    if (type === 'bot' && withActions) {
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const thumbUp = document.createElement('button');
      thumbUp.className = 'thumb-btn';
      thumbUp.title = 'Hilfreich';
      thumbUp.setAttribute('aria-label', 'Antwort hilfreich');
      thumbUp.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>`;

      const thumbDown = document.createElement('button');
      thumbDown.className = 'thumb-btn';
      thumbDown.title = 'Nicht hilfreich';
      thumbDown.setAttribute('aria-label', 'Antwort nicht hilfreich');
      thumbDown.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>`;

      thumbUp.onclick = () => { thumbUp.classList.toggle('active', !thumbUp.classList.contains('active')); thumbDown.classList.remove('active'); };
      thumbDown.onclick = () => { thumbDown.classList.toggle('active', !thumbDown.classList.contains('active')); thumbUp.classList.remove('active'); };

      const speakBtn = document.createElement('button');
      speakBtn.className = 'speak-btn';
      speakBtn.title = 'Vorlesen';
      speakBtn.setAttribute('aria-label', 'Antwort vorlesen');
      speakBtn.innerHTML = `<svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
      speakBtn.onclick = () => speakText(bubble.innerHTML, speakBtn);

      actions.appendChild(thumbUp);
      actions.appendChild(thumbDown);
      actions.appendChild(speakBtn);
      wrapper.appendChild(actions);
    }

    box.appendChild(wrapper);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  // ── Sicherheit: Reply sanitizen ───────────────────────────────────
  function cleanReply(text) {
    if (typeof text !== 'string') return '';

    // Markdown entfernen
    text = text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/#{1,3} /g, '');

    // Zeilenumbrüche
    const lines = text.split('\n');
    const parts = [];

    for (const line of lines) {
      // URLs sicher verlinken — nur http/https
      const linkedLine = line.replace(/(https?:\/\/[^\s<>"']+)/g, (url) => {
        if (!isSafeUrl(url)) return escapeHtml(url);
        try {
          const { pathname } = new URL(url);
          const segments = pathname.split('/').filter(Boolean);
          const label = segments.length > 0
            ? decodeURIComponent(segments[segments.length - 1])
                .replace(/-/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase())
            : new URL(url).hostname;
          return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(label)}</a>`;
        } catch { return escapeHtml(url); }
      });
      parts.push(linkedLine);
    }

    return parts.join('<br>');
  }

  // ── Nachricht senden ──────────────────────────────────────────────
  async function send() {
    if (isSending) return; // Doppel-Submit verhindern
    const input = document.getElementById('chatbot-input');
    const btn = document.getElementById('chatbot-send');
    const rawText = input.value.trim();

    // Validierung
    if (!rawText) return;
    if (rawText.length > MAX_MESSAGE_LENGTH) {
      input.value = rawText.slice(0, MAX_MESSAGE_LENGTH);
      return;
    }

    const strings = UI_STRINGS[selectedLanguage] || UI_STRINGS['DE'];
    isSending = true;
    input.value = '';
    btn.disabled = true;

    // User-Nachricht sicher anzeigen (escapeHtml)
    addMsg(escapeHtml(rawText), 'user');
    const loading = addMsg('<span class="dot"></span><span class="dot"></span><span class="dot"></span>', 'bot');

    try {
      const res = await fetch(`${BACKEND}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
        },
        body: JSON.stringify({
          message: rawText,
          context: context,
          siteUrl: siteUrl,
          language: ALLOWED_LANGUAGES.has(selectedLanguage) ? selectedLanguage : 'AUTO',
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (typeof data.reply !== 'string') throw new Error('Invalid response');
      const replyHtml = cleanReply(data.reply || strings.noAnswer);
      loading.parentElement.remove();
      addMsg(replyHtml, 'bot', true);
    } catch(e) {
      loading.innerHTML = escapeHtml(strings.error);
    } finally {
      btn.disabled = false;
      isSending = false;
    }
  }

  // ── Sprachumschalter ──────────────────────────────────────────────
  const langBtn = document.getElementById('askly-lang-btn');
  const langDropdown = document.getElementById('askly-lang-dropdown');

  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const rect = langBtn.getBoundingClientRect();
    langDropdown.style.top = (rect.bottom + 8) + 'px';
    langDropdown.style.right = (window.innerWidth - rect.right) + 'px';
    langDropdown.classList.toggle('open');
  });

  document.querySelectorAll('.lang-option').forEach(option => {
    option.addEventListener('click', (e) => {
      e.stopPropagation();
      const lang = option.dataset.lang;
      if (!ALLOWED_LANGUAGES.has(lang)) return; // Sicherheitscheck
      selectedLanguage = lang;
      document.querySelectorAll('.lang-option').forEach(o => {
        o.classList.remove('active');
        o.setAttribute('aria-selected', 'false');
      });
      option.classList.add('active');
      option.setAttribute('aria-selected', 'true');
      langDropdown.classList.remove('open');
      applyLanguage(selectedLanguage);
    });
  });

  document.addEventListener('click', () => langDropdown.classList.remove('open'));

  // Escape-Taste schliesst Widget
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('chatbot-box').classList.remove('open');
      langDropdown.classList.remove('open');
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (asklyListening) stopAndCancel();
    }
  });

  document.getElementById('chatbot-btn').onclick = () => {
    const box = document.getElementById('chatbot-box');
    const isOpening = !box.classList.contains('open');
    box.classList.toggle('open');
    if (isOpening) {
      if (!context) loadContext();
      setTimeout(() => document.getElementById('chatbot-input').focus(), 300);
    }
  };

  document.getElementById('chatbot-close').onclick = () => {
    document.getElementById('chatbot-box').classList.remove('open');
    langDropdown.classList.remove('open');
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (asklyListening) stopAndCancel();
  };

  document.getElementById('chatbot-send').onclick = send;
  document.getElementById('chatbot-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
</script>
